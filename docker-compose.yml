services:
  # ─────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: freelance_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER must be set in .env}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      POSTGRES_DB: ${DB_NAME:?DB_NAME must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./backend/src/database/migrations/002_payments_escrow_patch.sql:/docker-entrypoint-initdb.d/002_patch.sql:ro
      - ./backend/src/database/migrations/003_indexes_and_softdelete.sql:/docker-entrypoint-initdb.d/003_indexes.sql:ro
      - ./backend/src/database/migrations/004_notification_type_fix.sql:/docker-entrypoint-initdb.d/004_fixes.sql:ro
      - ./backend/src/database/migrations/005_local_payments_cod.sql:/docker-entrypoint-initdb.d/005_local_payments.sql:ro
      - ./backend/src/database/migrations/006_withdrawal_transfer_confirmation.sql:/docker-entrypoint-initdb.d/006_withdrawal.sql:ro
      - ./backend/src/database/migrations/007_content_banners_faq_cms.sql:/docker-entrypoint-initdb.d/007_content.sql:ro
      - ./backend/src/database/migrations/008_notification_platform_announcement.sql:/docker-entrypoint-initdb.d/008_notification.sql:ro
      - ./backend/src/database/migrations/009_proposals_hourly.sql:/docker-entrypoint-initdb.d/009_proposals.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: freelance_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Backend (NestJS)
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: freelance_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSL: "false"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET must be set in .env}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-https://localhost/api/auth/google/callback}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:-noreply@dopawork.jo}
      UPLOAD_DIR: /app/uploads
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      FRONTEND_URL: ${FRONTEND_URL:-https://localhost}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Frontend (Next.js)
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://localhost/api/v1}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-https://localhost}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
    container_name: freelance_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://localhost/api/v1}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-https://localhost}
    ports:
      - "3002:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Nginx Reverse Proxy (HTTPS)
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: freelance_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/init-ssl.sh:/etc/nginx/init-ssl.sh:ro
      - ssl_certs:/etc/nginx/certs
      - certbot_webroot:/var/www/certbot
      - uploads_data:/var/www/uploads:ro
    entrypoint: ["/bin/sh", "/etc/nginx/init-ssl.sh"]
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && wget -qO- http://127.0.0.1/nginx-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────
  # Certbot — Let's Encrypt certificate renewal
  # Obtain a real certificate:
  #   docker compose run --rm certbot certonly --webroot \
  #     -w /var/www/certbot -d yourdomain.com \
  #     --email you@yourdomain.com --agree-tos --non-interactive
  # ─────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: freelance_certbot
    volumes:
      - ssl_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    # Auto-renew certificates daily (no-op if not yet due)
    entrypoint: >
      sh -c "
        while true; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep 86400;
        done
      "
    depends_on:
      - nginx

  # ─────────────────────────────────────────────
  # Postgres Backup (daily pg_dump → /backups)
  # ─────────────────────────────────────────────
  postgres-backup:
    image: postgres:16-alpine
    container_name: freelance_backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${DB_PASSWORD}
    volumes:
      - backups_data:/backups
    # Run pg_dump every day at 02:00, keep last 7 dumps
    entrypoint: >
      sh -c "
        while true; do
          sleep 86400;
          FILENAME=/backups/backup_$$(date +%Y%m%d_%H%M%S).sql.gz;
          pg_dump -h postgres -U ${DB_USER} ${DB_NAME} | gzip > $$FILENAME;
          echo \"Backup written: $$FILENAME\";
          ls -t /backups/backup_*.sql.gz | tail -n +8 | xargs -r rm --;
        done
      "

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  backups_data:
  ssl_certs:
  certbot_webroot:

networks:
  default:
    name: freelance_network
