databases:
  - name: dopawork-db
    plan: free
    databaseName: dopawork_db
    user: dopawork_user

services:
  - type: web
    name: dopawork-backend
    plan: free
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run build && node scripts/run-migrations.js
    startCommand: node dist/main
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: dopawork-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "15m"
      - key: JWT_REFRESH_EXPIRES_IN
        value: "7d"
      - key: FRONTEND_URL
        value: https://lambent-bunny-1f68ea.netlify.app
      - key: NETLIFY_URL
        value: https://lambent-bunny-1f68ea.netlify.app
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
